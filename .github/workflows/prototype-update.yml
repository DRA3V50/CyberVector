name: CyberVector Prototype Update

on:
  schedule:
    - cron: '0 14,2 * * *'  # 9AM and 9PM EST (UTC adjusted)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # -----------------------------
      # Phase I – Runtime Collection
      # -----------------------------

      - name: Run Auth Collector
        run: bash analysis/runtime/collect_auth.sh

      - name: Run Network Collector
        run: bash analysis/runtime/collect_network.sh

      - name: Run System Collector
        run: bash analysis/runtime/collect_system.sh

      # -----------------------------
      # Phase II – Tooling Layer
      # -----------------------------

      - name: Run Patch Audit
        run: bash tools/patch_audit.sh

      # NOTE:
      # exposure_snapshot.sh is interactive and prints to stdout.
      # It does not generate artifacts.
      # Keeping it out of automation prevents unnecessary noise.

      # log_parser.py is a manual investigation tool.
      # Removing from workflow to prevent argument failure.

      # -----------------------------
      # Phase III – Generate README Dashboard
      # -----------------------------

      - name: Generate Runtime Report
        run: python analysis/runtime/generate_report.py

      # -----------------------------
      # Commit Only What Matters
      # -----------------------------

      - name: Commit updates
        run: |
          git config --local user.email "actions@github.com"
          git config --local user.name "github-actions"

          git add README.md
          git add artifacts/

          git commit -m "Auto-update runtime dashboard" || echo "No changes to commit"
          git push
